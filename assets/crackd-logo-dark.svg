<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <!-- Cipher Tile mark -->
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="60" height="60" rx="14" stroke="#FF00A8" stroke-width="4" fill="none"/>
    <circle cx="20" cy="20" r="6" fill="#FF00A8"/>
    <circle cx="40" cy="20" r="5" stroke="#FF00A8" stroke-width="3" fill="none"/>
    <circle cx="20" cy="40" r="5" stroke="#FF00A8" stroke-width="3" fill="none"/>
    <circle cx="40" cy="40" r="6" fill="#FF00A8"/>
  </g>
  <!-- Wordmark -->
  <text x="100" y="65" font-family="system-ui, sans-serif" font-weight="600" font-size="44" letter-spacing="-2" fill="#040008">
    CRACK<tspan fill="#FF00A8">D</tspan>
  </text>
</svg>
